<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>puter-js test fixture: menubar + contextMenu</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 16px; }
        button { padding: 8px 12px; margin-right: 8px; font-size: 14px; }
        #log { margin-top: 16px; padding: 8px; background: #f5f5f5; border: 1px solid #ddd; min-height: 60px; font-family: monospace; white-space: pre-wrap; }
        .ready #status { color: green; }
    </style>
</head>
<body>
    <h1>puter-js test fixture</h1>
    <p id="status">Loading puter.js…</p>

    <button id="set-menubar-btn" disabled>Set Menubar</button>
    <button id="ctx-trigger" disabled>Show Context Menu</button>

    <div id="log" data-testid="log"></div>

    <script src="/dist/puter.dev.js"></script>
    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function log(entry) {
            const line = document.createElement('div');
            line.textContent = entry;
            line.dataset.entry = entry;
            logEl.appendChild(line);
        }

        function ready() {
            document.body.classList.add('ready');
            statusEl.textContent = `Ready (env=${puter.env})`;
            document.getElementById('set-menubar-btn').disabled = false;
            document.getElementById('ctx-trigger').disabled = false;
        }

        function waitForPuter() {
            if (window.puter && puter.ui) ready();
            else setTimeout(waitForPuter, 50);
        }
        waitForPuter();

        document.getElementById('set-menubar-btn').addEventListener('click', () => {
            puter.ui.setMenubar({
                items: [
                    { label: 'TestFile', action: () => log('menubar:TestFile') },
                    { label: 'TestEdit', items: [
                        { label: 'TestUndo', action: () => log('menubar:TestUndo') },
                        { label: 'TestRedo', action: () => log('menubar:TestRedo') },
                    ]},
                ],
            });
            log('menubar:set');
        });

        document.getElementById('ctx-trigger').addEventListener('click', () => {
            puter.ui.contextMenu({
                items: [
                    { label: 'CtxAlpha', action: () => log('ctx:CtxAlpha') },
                    { label: 'CtxBeta', action: () => log('ctx:CtxBeta') },
                    '-',
                    { label: 'CtxGamma', action: () => log('ctx:CtxGamma') },
                ],
            });
            log('ctx:opened');
        });
    </script>
</body>
</html>
